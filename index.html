<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holanda Perícias — Prazos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F2F8FC;color:#222;min-height:100vh}
header{background:#005F88;color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-wrap:wrap;gap:12px}
header h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;letter-spacing:.5px}
header .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
header button{background:#00AEEF;color:#fff;border:0;padding:8px 14px;border-radius:6px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;font-size:14px}
header button:hover{background:#0098d1}
header button.ghost{background:rgba(255,255,255,.15)}
nav{background:#fff;border-bottom:1px solid #d6e4ef;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
nav button{background:none;border:0;padding:14px 18px;font-family:'Barlow',sans-serif;font-weight:600;color:#005F88;cursor:pointer;border-bottom:3px solid transparent;font-size:14px;white-space:nowrap}
nav button.active{border-bottom-color:#00AEEF;color:#003c56}
main{padding:24px 28px;max-width:1400px;margin:0 auto}
.section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:20px}
.section h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#005F88;margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section h2 .cnt{background:#00AEEF;color:#fff;font-size:12px;padding:2px 10px;border-radius:10px}
.section.warn{background:#fffbec;border:1px solid #f3d98a}
.section.warn h2{color:#a35a07}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;font-size:13px;color:#6b7c8c}
.toolbar select,.toolbar input{padding:7px 10px;border:1px solid #cdd9e3;border-radius:5px;font-family:inherit;font-size:13px;background:#fff}
.tag{display:inline-block;padding:3px 10px;border-radius:11px;font-size:11px;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;color:#fff}
.tag.t-pericia{background:#E8A838}
.tag.t-manif{background:#4CAF50}
.tag.t-manifc{background:#009688}
.tag.t-quesitos{background:#2196F3}
.tag.t-outro{background:#6b7c8c}
.tag.urg{background:#d64545;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.btn{background:#00AEEF;color:#fff;border:0;padding:8px 14px;border-radius:5px;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:#0098d1}
.btn.green{background:#22a06b}.btn.green:hover{background:#1a8358}
.btn.orange{background:#f08c1f}.btn.orange:hover{background:#c47314}
.btn.gray{background:#6b7c8c}.btn.gray:hover{background:#55646f}
.btn.sm{padding:5px 10px;font-size:12px}
/* ===== Lista ===== */
.card-list{display:flex;flex-direction:column;gap:10px}
.prazo-card{background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06);border-left:5px solid #00AEEF;transition:all .15s;position:relative;display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px}
.prazo-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.prazo-card .row-main{flex:1;min-width:260px;display:flex;flex-direction:column;gap:2px}
.prazo-card .row-checks{display:flex;gap:12px;flex-wrap:wrap;font-size:12px}
.prazo-card .row-act{display:flex;gap:6px;align-items:center}
.btn.danger{background:#d64545}.btn.danger:hover{background:#a82929}
.btn.iconbtn{background:none;color:#6b7c8c;padding:4px 8px}
.btn.iconbtn:hover{color:#d64545;background:#fdecec}
.prazo-card.pericia{border-left-color:#E8A838}
.prazo-card.manif{border-left-color:#4CAF50}
.prazo-card.manifc{border-left-color:#009688}
.prazo-card.quesitos{border-left-color:#2196F3}
.prazo-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.prazo-card .caso{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#003c56;line-height:1.2}
.prazo-card .when{font-size:13px;color:#005F88;font-weight:600;margin:6px 0}
.prazo-card .meta{font-size:12px;color:#6b7c8c;margin-top:4px;line-height:1.5}
.prazo-card .meta b{color:#003c56}
.prazo-card .checks{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:12px}
.prazo-card .checks label{display:flex;gap:4px;align-items:center;cursor:pointer;color:#005F88}
.prazo-card .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.group-head{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;color:#005F88;font-size:14px;font-weight:700;margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid #d6e4ef;grid-column:1/-1}
/* ===== Calendário ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-head .nav{display:flex;gap:6px;align-items:center}
.cal-head .ttl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:22px;color:#003c56;font-weight:700}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{text-align:center;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:12px;color:#005F88;font-weight:700;padding:6px 0}
.cal .day{background:#F8FBFD;border:1px solid #e0eaf1;border-radius:7px;min-height:110px;padding:6px;font-size:11px;overflow:hidden;display:flex;flex-direction:column;gap:3px}
.cal .day.other{background:#fff;color:#b8c5d0}
.cal .day.today{border-color:#00AEEF;box-shadow:0 0 0 2px #00AEEF}
.cal .day .dn{font-weight:700;color:#003c56;font-size:13px;margin-bottom:2px}
.cal .day .chip{background:#fff;border-left:3px solid #00AEEF;padding:3px 5px;border-radius:3px;font-size:10px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.25}
.cal .day .chip.pericia{border-left-color:#E8A838}
.cal .day .chip.manif{border-left-color:#4CAF50}
.cal .day .chip.manifc{border-left-color:#009688}
.cal .day .chip.quesitos{border-left-color:#2196F3}
.cal .day .chip.urg{background:#fdecec;border-left-color:#d64545}
/* ===== Perícia cards expandidos ===== */
.pericia-box{background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.08);border-top:4px solid #E8A838;margin-bottom:14px}
.pericia-box h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:#003c56;text-transform:uppercase;margin-bottom:6px}
.pericia-box .proc{font-size:12px;color:#6b7c8c;font-family:'Barlow Condensed',sans-serif;margin-bottom:10px}
.pericia-box .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px 18px;font-size:13px}
.pericia-box .grid div{color:#003c56}
.pericia-box .grid b{color:#6b7c8c;font-size:11px;text-transform:uppercase;display:block;font-weight:600}
.pericia-box .grid input,.pericia-box .grid select,.pericia-box .grid textarea{width:100%;padding:6px 8px;border:1px solid #cdd9e3;border-radius:5px;font-family:inherit;font-size:13px;margin-top:2px}
.pericia-box .chks{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #eef3f7}
.pericia-box .chks label{display:flex;gap:6px;align-items:center;font-size:13px;color:#003c56;cursor:pointer}
.pericia-box .foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px;flex-wrap:wrap}
.pericia-box .msg{font-size:12px;font-weight:600}
.pericia-box .msg.ok{color:#1a7a4f}.pericia-box .msg.err{color:#a82929}
/* ===== Alertas ===== */
.alert{background:#fff7e6;border-left:4px solid #f08c1f;padding:12px 16px;border-radius:6px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert.alta{background:#fdecec;border-left-color:#d64545}
.alert .icon{font-size:22px;line-height:1}
.alert .body{flex:1;font-size:13px;color:#003c56}
.alert .body .src{font-size:11px;color:#6b7c8c;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.alert .body .t{font-weight:700;margin-bottom:3px}
.alert .body .d{color:#5a6c7d}
.alert .actions{display:flex;gap:6px;flex-wrap:wrap}
/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,60,86,.55);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}
.modal{background:#fff;border-radius:12px;padding:26px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-family:'Barlow Condensed',sans-serif;color:#005F88;text-transform:uppercase;margin-bottom:16px;font-size:22px}
.modal .fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.modal label{display:block;font-size:11px;text-transform:uppercase;font-weight:600;color:#005F88;margin-bottom:4px;letter-spacing:.3px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px;border:1px solid #cdd9e3;border-radius:5px;font-family:'Barlow',sans-serif;font-size:14px}
.modal textarea{min-height:70px;resize:vertical}
.modal .full{grid-column:1/-1}
.modal .foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.modal .msg{font-size:12px;font-weight:600;flex:1;align-self:center}
.modal .msg.ok{color:#1a7a4f}.modal .msg.err{color:#a82929}
/* ===== Login / states ===== */
.loader{text-align:center;padding:40px;color:#6b7c8c}
.loader .sp{display:inline-block;width:36px;height:36px;border:4px solid #e0eaf1;border-top-color:#00AEEF;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:28px;text-align:center;color:#6b7c8c;font-style:italic}
.toast{position:fixed;top:16px;right:16px;background:#005F88;color:#fff;padding:14px 18px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:200;max-width:360px;font-size:13px}
.toast.err{background:#a82929}
.toast.ok{background:#22a06b}
#login{position:fixed;inset:0;background:#005F88;display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;padding:36px;border-radius:12px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);max-width:340px;width:90%}
#login h2{font-family:'Barlow Condensed',sans-serif;color:#005F88;margin-bottom:18px;font-size:22px;text-transform:uppercase}
#login input{width:100%;padding:12px;border:1px solid #cdd9e3;border-radius:6px;font-size:15px;margin-bottom:12px;font-family:'Barlow',sans-serif}
#login button{width:100%;background:#005F88;color:#fff;border:0;padding:12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:15px}
#login button:hover{background:#003c56}
#login .err{color:#d64545;font-size:13px;margin-top:8px;min-height:18px}
@media(max-width:720px){
  main{padding:16px}
  .card-list{grid-template-columns:1fr}
  .cal .day{min-height:70px;font-size:10px}
  .cal .day .dn{font-size:11px}
  .cal .day .chip{font-size:9px;padding:2px 3px}
  nav{padding:0 16px}
  header{padding:14px 16px}
  header h1{font-size:20px}
}
</style>
</head>
<body>

<div id="app">
<header>
  <h1>HOLANDA PERÍCIAS — PRAZOS</h1>
  <div class="actions">
    <button id="novoPrazoBtn">+ Novo Prazo</button>
    <button id="reloadBtn" class="ghost" title="Recarregar">↻</button>
  </div>
</header>
<nav>
  <button data-tab="lista" class="active">Prazos Atuais</button>
  <button data-tab="calendario">Calendário</button>
  <button data-tab="pospericia">Pós-Perícia <span id="posPericiaBadge" style="display:none;background:#E8A838;color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;margin-left:4px"></span></button>
  <button data-tab="passados">Prazos Passados</button>
  <button data-tab="alertas" id="alertasTabBtn">⚠️ Alertas <span id="alertasBadge" style="display:none;background:#d64545;color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;margin-left:4px"></span></button>
</nav>
<main id="content"><div class="loader"><div class="sp"></div>Carregando...</div></main>
</div>

<div id="modalHost"></div>
<div id="toastHost"></div>

<script>
// ===== CONFIG =====
const BASE='appTEAYT5TYhnQwTn';
const TBL={prazos:'tbln95BoOQe7ZXpzJ',casos:'tbluIGDmDWYdvIXGh',assist:'tblK0oBCU9EmeXwLf',cob:'tblMSxzQ0WlFPYU8A'};
const F={
  p:{nome:'fldYIzflTahI2p0pe',tipo:'fldwFdFcb76bkbjD4',caso:'fldJ5zNofON8zZHQO',situacao:'flduHW2EqykVwIzcu',data:'fldYl3z2vJDBxc7ql',tipoPer:'fld9B7glkHxnUSnlQ',statusAss:'fld1eWoDmIx4Xsr4l',local:'fldtOaPUfTwXpVTRy',assistente:'fld7FZUBM7KDz6JlK',municipio:'fldERV4m93IZT9kZO',remarc:'fldQPXvXFiKlS2tXp',preLaudo:'fldpWvUMHzDcEqUsd',confAss:'fldL1IF1ryc3G2ilA',relato:'fldDlrhNhRznqCSoA',obs:'fldQCwpQ6tMlO5sVa',cidade:'flds7nm3aHllMYAGQ',finalizado:'fldrhICAJtN3gqXkR',valorAss:'fldp3Y2x1I5EZHzyE',realizada:'fldxFpOrY9XIEtgiX',comentarioAss:'fldeLli35dBMXk1vu',relatorioPos:'fldB2hP0THsLfonLO',confWpp:'fldPTHA4cfxdkQVQq',cobrancas:'fldHecjc2r12cK87T'},
  cob:{tipo:'flduuDN0KZkIxDa5E',pago:'fldseQscWInxIjkWT',valorPag:'fldNRRnaAxXSwcyZ0',dataPag:'fldMqz2o0dokkPDKI',tipopg:'fldj7Q9GWFQls64un',categoria:'fldPqnKqC93PmqdUy',assistente:'fld18er35haoa5vHt',pix:'fldJvYZ0ejSYn2gyS',caso:'fldxNcSHI6NwRA1Ec',prazos:'fldTcLs9Hbhkn4hp7',recebido:'fldJF2iTO9MuOrvPu'},
  a:{nome:'fldaYZAZioP0rVl4O',esp:'fldKZJvPLcO56iRMK',email:'fld0WW3RfuJJRbd9n',phone:'fldAcouFHEHO7KwlZ',local:'fldcnq8lrMMLyTnBG',pix:'fldF4Y5ATZAGNHYM4'},
  c:{palavra:'fldj5FBvJfRd0BC22',processo:'fldzUYMqa3SNmcaiy',fase:'fld86RIjqxRbIyK2H',tipo:'fldQFTIMb6qh8hvfN',cliente:'fld7ddtpPu5BrgIoL',prazos:'fldOwEr9lEEitNdl7'}
};

// ===== TOKEN (sem senha) =====
const TK='patUImrXK1EQGmOQ6.b11a324c84d2dd8b34f62ca5a81bb2ef330dd9b8e4bd589bc4e162a581ff1f15';

// ===== TOAST =====
function toast(msg,kind){
  const el=document.createElement('div');el.className='toast '+(kind||'');el.textContent=msg;
  document.getElementById('toastHost').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

// ===== DATA =====
const DATA={prazos:[],casos:[],assist:[],pje:[],gmail:[],posPericias:[],cobs:[]};
const CASO_BY_ID={},ASSIST_BY_ID={};

async function fetchAll(table,filterByFormula){
  const recs=[];let offset='';
  do{
    let url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'?returnFieldsByFieldId=true&pageSize=100'+(offset?'&offset='+encodeURIComponent(offset):'');
    if(filterByFormula)url+='&filterByFormula='+encodeURIComponent(filterByFormula);
    const r=await fetch(url,{headers:{Authorization:'Bearer '+TK}});
    if(!r.ok)throw new Error('HTTP '+r.status+' '+table);
    const j=await r.json();
    recs.push.apply(recs,j.records);
    offset=j.offset||'';
  }while(offset);
  return recs;
}

async function patchRecord(table,id,fields){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'/'+id,{
    method:'PATCH',headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  if(!r.ok)throw new Error('PATCH '+r.status);
  return r.json();
}
async function createRecord(table,fields){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table),{
    method:'POST',headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  if(!r.ok){const t=await r.text();throw new Error('POST '+r.status+' '+t);}
  return r.json();
}
// Componente reutilizável: campo de busca de assistente com autocomplete + opção de criar novo
function buildAssistenteSearch(opts){
  // opts: {currentId, onPick(assRec), placeholder}
  const wrap=document.createElement('div');wrap.style.cssText='position:relative;width:100%';
  const current=opts.currentId?ASSIST_BY_ID[opts.currentId]:null;
  wrap.innerHTML=
    '<input type="text" class="ass-input" autocomplete="off" placeholder="'+(opts.placeholder||'Buscar assistente por nome, especialidade ou cidade...')+'" '+
      'value="'+escHtml(current?(current.fields[F.a.nome]||''):'')+'" '+
      'style="width:100%;padding:8px;border:1px solid #cdd9e3;border-radius:5px;font-family:inherit;font-size:13px">'+
    '<div class="ass-list" style="display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #cdd9e3;border-radius:6px;max-height:280px;overflow-y:auto;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.12)"></div>'+
    (current?'<small style="color:#6b7c8c;display:block;margin-top:2px">'+escHtml(current.fields[F.a.phone]||'')+(current.fields[F.a.email]?' · '+escHtml(current.fields[F.a.email]):'')+(current.fields[F.a.local]?' · '+escHtml(current.fields[F.a.local]):'')+'</small>':'');
  const inp=wrap.querySelector('.ass-input');
  const list=wrap.querySelector('.ass-list');
  let pickedId=opts.currentId||'';
  function buildList(q){
    const ql=(q||'').toLowerCase().trim();
    let items=DATA.assist;
    if(ql){
      items=items.filter(a=>{
        const f=a.fields;
        return (f[F.a.nome]||'').toLowerCase().includes(ql)
          ||(f[F.a.esp]||'').toLowerCase().includes(ql)
          ||(f[F.a.local]||'').toLowerCase().includes(ql);
      });
    }
    items=items.slice(0,20);
    let html='';
    if(items.length){
      html=items.map(a=>{
        const f=a.fields;
        return '<div data-id="'+a.id+'" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #eef3f7;font-size:13px">'+
          '<b>'+escHtml(f[F.a.nome]||'(sem nome)')+'</b>'+
          (f[F.a.esp]?' <span style="font-size:11px;color:#6b7c8c;background:#f0f7fc;padding:1px 6px;border-radius:8px">'+escHtml(f[F.a.esp])+'</span>':'')+
          (f[F.a.local]?'<br><small style="color:#6b7c8c">📍 '+escHtml(f[F.a.local])+'</small>':'')+
        '</div>';
      }).join('');
    }else{
      html='<div style="padding:10px 12px;color:#6b7c8c;font-size:13px">Nenhum assistente encontrado.</div>';
    }
    html+='<div data-act="novo" style="padding:10px 12px;cursor:pointer;background:#f8fbfd;border-top:2px solid #00AEEF;font-size:13px;font-weight:700;color:#005F88">+ Cadastrar Novo Assistente</div>';
    list.innerHTML=html;
    list.style.display='block';
    list.querySelectorAll('[data-id]').forEach(el=>{
      el.onmouseenter=()=>el.style.background='#f0f7fc';
      el.onmouseleave=()=>el.style.background='';
      el.onclick=()=>{
        const a=DATA.assist.find(x=>x.id===el.dataset.id);
        if(!a)return;
        pickedId=a.id;
        inp.value=a.fields[F.a.nome]||'';
        list.style.display='none';
        if(opts.onPick)opts.onPick(a);
      };
    });
    list.querySelector('[data-act=novo]').onclick=()=>{
      list.style.display='none';
      openNovoAssistenteModal({nome:inp.value},newAss=>{
        DATA.assist.push(newAss);ASSIST_BY_ID[newAss.id]=newAss;
        pickedId=newAss.id;inp.value=newAss.fields[F.a.nome]||'';
        if(opts.onPick)opts.onPick(newAss);
      });
    };
  }
  inp.oninput=()=>{pickedId='';buildList(inp.value);};
  inp.onfocus=()=>buildList(inp.value);
  inp.onblur=()=>setTimeout(()=>{list.style.display='none';},220);
  wrap.getValue=()=>pickedId;
  return wrap;
}

// Modal pra cadastrar novo assistente
function openNovoAssistenteModal(prefill,onCreate){

      '<div><label>Especialidade</label><select id="aEsp"><option value="">—</option>'+espOpts.map(s=>'<option>'+s+'</option>').join('')+'</select></div>'+
      '<div><label>Telefone / WhatsApp</label><input type="text" id="aTel" placeholder="(85) 9xxxx-xxxx"></div>'+
      '<div class="full"><label>Email</label><input type="email" id="aEmail"></div>'+
      '<div class="full"><label>Local de Atuação (cidade/UF)</label><input type="text" id="aLocal" placeholder="Ex: Fortaleza/CE"></div>'+
      '<div class="full"><label>Chave PIX</label><input type="text" id="aPix" placeholder="CPF, telefone, email ou aleatória"></div>'+
    '</div>'+
    '<div class="foot"><span class="msg"></span><button class="btn gray" id="cl">Cancelar</button><button class="btn green" id="sv">Salvar Assistente</button></div>';
  bg.appendChild(m);document.getElementById('modalHost').appendChild(bg);
  const close=()=>bg.remove();
  m.querySelector('#cl').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};
  const msg=m.querySelector('.msg');
  m.querySelector('#sv').onclick=async()=>{
    const nome=m.querySelector('#aNome').value.trim();
    if(!nome){msg.textContent='Nome é obrigatório';msg.className='msg err';return;}
    const fields={};
    fields[F.a.nome]=nome.toUpperCase();
    const esp=m.querySelector('#aEsp').value;if(esp)fields[F.a.esp]=esp;
    const tel=m.querySelector('#aTel').value.trim();if(tel)fields[F.a.phone]=tel;
    const email=m.querySelector('#aEmail').value.trim();if(email)fields[F.a.email]=email;
    const local=m.querySelector('#aLocal').value.trim();if(local)fields[F.a.local]=local;
    const pix=m.querySelector('#aPix').value.trim();if(pix)fields[F.a.pix]=pix;

      close();
      if(onCreate)onCreate(created);
    }catch(e){msg.textContent='Erro: '+e.message;msg.className='msg err';}
  };
}

async function deleteRecord(table,id){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(table)+'/'+id,{
    method:'DELETE',headers:{Authorization:'Bearer '+TK}
  });
  if(!r.ok)throw new Error('DELETE '+r.status);
  return r.json();
}

async function loadJSON(path){
  try{const r=await fetch(path+'?t='+Date.now());if(!r.ok)return{alerts:[]};return await r.json();}catch(e){return{alerts:[]};}
}

// Filtros
function filterPrazosAtuais(){
  return "AND(NOT({Finalizado?}),NOT({Situação}=\"Arquivado\"),IS_AFTER({Data da Perícia},DATEADD(TODAY(),-1,'days')))";
}
function filterPrazosRange(deIso,ateIso){
  return "AND(NOT({Situação}=\"Arquivado\"),IS_AFTER({Data da Perícia},'"+deIso+"'),IS_BEFORE({Data da Perícia},'"+ateIso+"'))";
}
// Pós-perícia: perícias recentes (últimos 7 dias + futuras próximas), não remarcadas
// "A partir de agora" — só trabalha com perícias novas, não traz histórico
function filterPosPericia(){
  return "AND({Tipo de Prazos}=\"Perícia\",NOT({Situação}=\"Arquivado\"),NOT({Pericia remarcada?}),IS_AFTER({Data da Perícia},DATEADD(TODAY(),-7,'days')),IS_BEFORE({Data da Perícia},DATEADD(TODAY(),1,'days')))";
}

async function loadData(){
  const c=document.getElementById('content');
  c.innerHTML='<div class="loader"><div class="sp"></div>Carregando prazos atuais...</div>';
  try{
    const [prazos,casos,assist,posPer,cobs,pje,gmail]=await Promise.all([
      fetchAll(TBL.prazos,filterPrazosAtuais()),
      fetchAll(TBL.casos),
      fetchAll(TBL.assist),
      fetchAll(TBL.prazos,filterPosPericia()),
      fetchAll(TBL.cob),
      loadJSON('pje-alerts.json'),
      loadJSON('gmail-alerts.json')
    ]);
    DATA.prazos=prazos;DATA.casos=casos;DATA.assist=assist;
    DATA.posPericias=posPer;DATA.cobs=cobs;
    DATA.pje=pje.alerts||[];DATA.gmail=gmail.alerts||[];
    casos.forEach(r=>CASO_BY_ID[r.id]=r);
    assist.forEach(r=>ASSIST_BY_ID[r.id]=r);
    render();
  }catch(e){
    c.innerHTML='<div class="section"><h2>Erro</h2><div>'+e.message+'</div></div>';
  }
}
async function loadPassados(de,ate){
  const c=document.getElementById('content');
  c.innerHTML='<div class="loader"><div class="sp"></div>Carregando prazos passados...</div>';
  try{
    DATA.prazosPassados=await fetchAll(TBL.prazos,filterPrazosRange(de,ate));
    render();
  }catch(e){
    c.innerHTML='<div class="section"><h2>Erro</h2><div>'+e.message+'</div></div>';
  }
}

// ===== HELPERS =====
const TIPO_CLASS={
  'Quesitos e Assistentes':'quesitos','Perícia':'pericia','Manifestação ao Laudo':'manif','Manifestação Complementar':'manifc'
};
function tipoClass(tipo){return TIPO_CLASS[tipo]||'outro';}
function firstTipo(rec){const v=rec.fields[F.p.tipo];if(!v)return null;return Array.isArray(v)?v[0]:v;}
// === HELPERS DE DATA — sem conversão de fuso (mesma convenção do prelaudo) ===
// Airtable armazena "2026-04-14T10:00:00.000Z" e a gente trata os dígitos literais
// como sendo o horário local de Brasília (ignora o Z).
function isoLocalDate(iso){if(!iso)return'';const p=iso.split('T')[0];const [y,m,d]=p.split('-');return d+'/'+m+'/'+y;}
function isoLocalTime(iso){if(!iso)return'';const t=iso.split('T')[1];return t?t.slice(0,5):'';}
function fmtDate(iso){if(!iso)return'';const d=isoLocalDate(iso);const t=isoLocalTime(iso);return d+(t?' '+t:'');}
function isoToInputDatetime(iso){if(!iso)return'';const [d,t]=iso.split('T');return d+'T'+(t?t.slice(0,5):'00:00');}
function inputDatetimeToIso(v){if(!v)return null;return v+':00.000Z';}
function inputDateToIso(v,hour){if(!v)return null;return v+'T'+(hour||'12:00')+':00.000Z';}
function dayKey(iso){return iso?iso.split('T')[0]:'';}
function todayKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function daysUntil(iso){
  if(!iso)return null;
  const [y,m,d]=iso.split('T')[0].split('-').map(Number);
  const target=new Date(y,m-1,d);
  const n=new Date();const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  return Math.round((target-today)/86400000);
}
function casoNome(rec){
  const link=rec.fields[F.p.caso];
  if(!link||!link.length)return'(sem caso)';
  const c=CASO_BY_ID[link[0]];
  if(!c)return'(caso não carregado)';
  return c.fields[F.c.palavra]||'(sem palavra-chave)';
}
function casoProcesso(rec){
  const link=rec.fields[F.p.caso];
  if(!link||!link.length)return'';
  const c=CASO_BY_ID[link[0]];
  return c?(c.fields[F.c.processo]||''):'';
}
function assistFromPrazo(rec){
  const link=rec.fields[F.p.assistente];
  if(!link||!link.length)return null;
  return ASSIST_BY_ID[link[0]]||null;
}
function escHtml(s){return(s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function updateAlertasBadge(){
  const n=getActiveAlerts().length;
  const b=document.getElementById('alertasBadge');
  if(!b)return;
  if(n>0){b.textContent=n;b.style.display='inline-block';}else b.style.display='none';

function updatePosPericiaBadge(){
  const n=getPosPericiasAtivas().length;
  const b=document.getElementById('posPericiaBadge');
  if(!b)return;
  if(n>0){b.textContent=n;b.style.display='inline-block';}else b.style.display='none';
}
function getPosPericiasAtivas(){
  // Retorna pós-perícias ativas: não remarcadas, e não tem pagamento ao assistente quitado
  return (DATA.posPericias||[]).filter(p=>{
    if(p.fields[F.p.remarc])return false;
    const cobLinks=p.fields[F.p.cobrancas]||[];
    if(cobLinks.length){
      const allPaid=cobLinks.every(cid=>{
        const c=(DATA.cobs||[]).find(x=>x.id===cid);
        return c&&c.fields[F.cob.pago];
      });
      if(allPaid)return false;
    }
    return true;
  });
}

// ----- ALERTAS -----
const IGNORED_KEY='prazos_ignored_alerts';
function getIgnored(){try{return JSON.parse(localStorage.getItem(IGNORED_KEY)||'[]');}catch(e){return[];}}
function ignoreAlert(id){const a=getIgnored();if(!a.includes(id))a.push(id);localStorage.setItem(IGNORED_KEY,JSON.stringify(a));render();}

// Constrói mapa processo -> casoId (a partir de DATA.casos)
function buildProcessoIndex(){
  const m={};
  DATA.casos.forEach(c=>{
    const p=(c.fields[F.c.processo]||'').replace(/\D/g,'');
    if(p)m[p]=c.id;
  });
  return m;
}
// Retorna true se já existe prazo ativo desse tipo para o caso
function hasActivePrazo(casoId,tipoSugerido){
  if(!casoId)return false;
  return DATA.prazos.some(r=>{
    const link=r.fields[F.p.caso]||[];
    if(!link.includes(casoId))return false;
    if(!tipoSugerido)return true;
    const t=r.fields[F.p.tipo]||[];
    const tipos=Array.isArray(t)?t:[t];
    return tipos.includes(tipoSugerido);
  });
}
function getActiveAlerts(){
  const ignored=getIgnored();
  const procIdx=buildProcessoIndex();
  const all=[
    ...DATA.pje.map(a=>Object.assign({_src:'PJe'},a)),
    ...DATA.gmail.map(a=>Object.assign({_src:'Gmail'},a))
  ];
  return all.filter(a=>{
    if(ignored.includes(a.id))return false;
    // Resolver casoId via numeroProcesso se não vier direto
    let casoId=a.casoSugerido||a.casoId||'';
    if(!casoId&&a.numeroProcesso){
      const key=a.numeroProcesso.replace(/\D/g,'');
      casoId=procIdx[key]||'';
    }
    a._casoId=casoId;
    // Dedup: se já tem prazo ativo do mesmo tipo pro caso, esconde
    if(hasActivePrazo(casoId,a.tipoSugerido))return false;
    return true;
  });
}

function buildAlertRow(a){
  const el=document.createElement('div');el.className='alert '+(a.urgencia==='alta'?'alta':'');
  const isManifPerdida=a.tipo==='manifestacao_perdida';
  const icon=isManifPerdida?'📋':(a.urgencia==='alta'?'🔴':'⚠️');
  const srcLabel=a._src==='PJe'?'PJe — '+(a.numeroProcesso||''):'Gmail — '+(a.de||'');
  el.innerHTML='<div class="icon">'+icon+'</div>'+
    '<div class="body"><div class="src">'+escHtml(srcLabel)+'</div>'+
    '<div class="t">'+escHtml(a.casoNome||a.assunto||'')+'</div>'+
    '<div class="d">'+escHtml(a.descricao||a.resumo||'')+'</div></div>'+
    '<div class="actions"></div>';
  const acts=el.querySelector('.actions');
  if(isManifPerdida){
    const enc=document.createElement('button');enc.className='btn sm green';enc.textContent='Encerrar p/ Cobrança';
    enc.onclick=()=>openEncerrarCobrancaModal(a);
    acts.appendChild(enc);
  }else{
    const ag=document.createElement('button');ag.className='btn sm';ag.textContent='Agendar Prazo';
    ag.onclick=()=>openNovoPrazoModal(a);
    acts.appendChild(ag);
  }
  const ig=document.createElement('button');ig.className='btn sm gray';ig.textContent='Ignorar';
  ig.onclick=()=>ignoreAlert(a.id);
  acts.appendChild(ig);
  return el;
}

// Modal: Encerrar para Cobrança (manifestação perdida)
function openEncerrarCobrancaModal(alert){
  const bg=document.createElement('div');bg.className='modal-bg';
  const m=document.createElement('div');m.className='modal';
  const dLaudo=alert.dataLaudo||alert.dataDeteccao||new Date().toISOString().slice(0,10);
  // data presumida: laudo + 15 dias
  const dPresumida=new Date(dLaudo);dPresumida.setDate(dPresumida.getDate()+15);
  const dPresumidaStr=dPresumida.toISOString().slice(0,10);
  // resolver casoId
  const procIdx=buildProcessoIndex();
  let casoId=alert._casoId||alert.casoId||alert.casoSugerido||'';
  if(!casoId&&alert.numeroProcesso){casoId=procIdx[alert.numeroProcesso.replace(/\D/g,'')]||'';}
  m.innerHTML='<h2>📋 Encerrar para Cobrança</h2>'+
    '<div style="font-size:13px;color:#6b7c8c;margin-bottom:14px">Isso vai criar um prazo de <b>Manifestação ao Laudo</b> retroativo (marcado como finalizado) no Airtable. A automação existente vai mover o caso para <b>Encerrado PARA COBRANÇA</b> automaticamente.</div>'+
    '<div class="fg">'+
      '<div class="full"><label>Caso</label><select id="fCaso"><option value="">— selecione —</option>'+
        DATA.casos.map(c=>'<option value="'+c.id+'"'+(c.id===casoId?' selected':'')+'>'+escHtml(c.fields[F.c.palavra]||'(sem nome)')+(c.fields[F.c.processo]?' — '+escHtml(c.fields[F.c.processo]):'')+'</option>').join('')+
      '</select></div>'+
      '<div><label>Data do Laudo (PJe)</label><input type="date" id="fLaudo" value="'+escHtml(dLaudo)+'"></div>'+
      '<div><label>Data Presumida da Manifestação</label><input type="date" id="fManif" value="'+escHtml(dPresumidaStr)+'"></div>'+
      '<div class="full"><label>Observação</label><textarea id="fObs">Registrado retroativamente via dashboard. Laudo publicado em '+escHtml(dLaudo)+' detectado via PJe. Cliente/advogados não avisaram.</textarea></div>'+
    '</div>'+
    '<div class="foot"><span class="msg"></span><button class="btn gray" id="cl">Cancelar</button><button class="btn green" id="sv">Confirmar e Encerrar</button></div>';
  document.getElementById('modalHost').appendChild(bg);bg.appendChild(m);
  const close=()=>bg.remove();
  m.querySelector('#cl').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};
  const msg=m.querySelector('.msg');
  // auto-recalc presumida quando muda laudo
  m.querySelector('#fLaudo').onchange=e=>{
    const d=new Date(e.target.value);d.setDate(d.getDate()+15);
    m.querySelector('#fManif').value=d.toISOString().slice(0,10);
  };
  m.querySelector('#sv').onclick=async()=>{
    const cid=m.querySelector('#fCaso').value;
    const dManif=m.querySelector('#fManif').value;
    const obs=m.querySelector('#fObs').value;
    if(!cid||!dManif){msg.textContent='Caso e data são obrigatórios';msg.className='msg err';return;}
    const fields={};
    fields[F.p.caso]=[cid];
    fields[F.p.tipo]=['Manifestação ao Laudo'];
    fields[F.p.data]=new Date(dManif+'T12:00:00').toISOString();
    fields[F.p.finalizado]=true;
    if(obs)fields[F.p.obs]=obs;
    try{
      await createRecord(TBL.prazos,fields);
      toast('Prazo criado — automação do Airtable vai encerrar o caso','ok');
      if(alert.id)ignoreAlert(alert.id);
      close();loadData();
    }catch(e){msg.textContent='Erro: '+e.message;msg.className='msg err';}
  };
}

// ----- LISTA (atuais/passados) -----
const TIPO_ORDER=['Quesitos e Assistentes','Perícia','Manifestação ao Laudo','Manifestação Complementar'];
let SORT_ATUAIS='tipo';
const STATUS_ASS_OPTS=['Não contratado','Contratado','Confirmado','Não confirmado','Compareceu','Não compareceu'];
const TIPO_PER_OPTS=['Medicina','Engenharia'];
const PASSADOS={de:'',ate:'',loaded:''};
function renderLista(opts){
  const mode=opts.mode;
  const sec=document.createElement('div');sec.className='section';
  const source=mode==='atuais'?DATA.prazos:(DATA.prazosPassados||[]);
  let items=source.slice().filter(r=>r.fields[F.p.data]);
  if(mode==='atuais'){
    const now=new Date();now.setHours(0,0,0,0);
    items=items.filter(r=>new Date(r.fields[F.p.data])>=now);
    sec.innerHTML='<h2>Prazos Atuais <span class="cnt">'+items.length+'</span> <span style="font-size:12px;color:#6b7c8c;font-weight:400;text-transform:none">(de hoje em diante)</span></h2>';
    const tb=document.createElement('div');tb.className='toolbar';
    tb.innerHTML='<span>Agrupar por:</span>'+
      '<select id="sortSel"><option value="tipo"'+(SORT_ATUAIS==='tipo'?' selected':'')+'>Tipo de prazo</option>'+
      '<option value="data"'+(SORT_ATUAIS==='data'?' selected':'')+'>Data</option></select>';
    sec.appendChild(tb);
    tb.querySelector('#sortSel').onchange=e=>{SORT_ATUAIS=e.target.value;render();};
  }else{
    if(!PASSADOS.de){const d=new Date();d.setDate(d.getDate()-30);PASSADOS.de=d.toISOString().slice(0,10);}
    if(!PASSADOS.ate){const d=new Date();d.setDate(d.getDate()-1);PASSADOS.ate=d.toISOString().slice(0,10);}
    sec.innerHTML='<h2>Prazos Passados <span class="cnt">'+items.length+'</span></h2>';
    const tb=document.createElement('div');tb.className='toolbar';
    tb.innerHTML='<span>De:</span><input type="date" id="dDe" value="'+PASSADOS.de+'">'+
      '<span>Até:</span><input type="date" id="dAte" value="'+PASSADOS.ate+'">'+
      '<button class="btn sm" id="dAp">Carregar</button>'+
      '<button class="btn sm gray" id="dQ1">Últimos 30d</button>'+
      '<button class="btn sm gray" id="dQ2">Últimos 90d</button>'+
      '<button class="btn sm gray" id="dQ3">Este ano</button>';
    sec.appendChild(tb);
    const apply=(de,ate)=>{PASSADOS.de=de;PASSADOS.ate=ate;PASSADOS.loaded=de+'|'+ate;loadPassados(de,ate);};
    tb.querySelector('#dAp').onclick=()=>apply(tb.querySelector('#dDe').value,tb.querySelector('#dAte').value);
    tb.querySelector('#dQ1').onclick=()=>{const a=new Date(),b=new Date();b.setDate(b.getDate()-30);apply(b.toISOString().slice(0,10),a.toISOString().slice(0,10));};
    tb.querySelector('#dQ2').onclick=()=>{const a=new Date(),b=new Date();b.setDate(b.getDate()-90);apply(b.toISOString().slice(0,10),a.toISOString().slice(0,10));};
    tb.querySelector('#dQ3').onclick=()=>{const a=new Date();apply(a.getFullYear()+'-01-01',a.toISOString().slice(0,10));};
    if(PASSADOS.loaded!==PASSADOS.de+'|'+PASSADOS.ate){
      sec.appendChild(Object.assign(document.createElement('div'),{className:'empty',innerHTML:'Escolha um período e clique em <b>Carregar</b>.'}));
      return sec;
    }
  }

  if(!items.length){sec.innerHTML+='<div class="empty">Nenhum prazo encontrado.</div>';return sec;}

  // Ordenação: Atuais pode ser "tipo" (grupos) ou "data" (cronológico agrupado por dia)
  const groups={};
  const orderBy=(mode==='atuais'&&SORT_ATUAIS==='data')?'data':'tipo';
  if(orderBy==='data'){
    items.sort((a,b)=>new Date(a.fields[F.p.data])-new Date(b.fields[F.p.data]));
    items.forEach(r=>{
      const d=new Date(r.fields[F.p.data]);
      const k=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
      (groups[k]=groups[k]||[]).push(r);
    });
  }else{
    items.forEach(r=>{const t=firstTipo(r)||'Outro';(groups[t]=groups[t]||[]).push(r);});
  }
  const orderedKeys=orderBy==='data'
    ?Object.keys(groups)
    :TIPO_ORDER.filter(k=>groups[k]).concat(Object.keys(groups).filter(k=>!TIPO_ORDER.includes(k)));
  orderedKeys.forEach(k=>{
    const list=groups[k];
    list.sort((a,b)=>new Date(a.fields[F.p.data])-new Date(b.fields[F.p.data]));
    const h=document.createElement('div');h.className='group-head';
    if(orderBy==='data'){
      h.innerHTML=escHtml(k)+' <span style="color:#6b7c8c;font-size:12px;margin-left:6px">('+list.length+')</span>';
    }else{
      h.innerHTML='<span class="tag t-'+tipoClass(k)+'">'+escHtml(k)+'</span> <span style="color:#6b7c8c;font-size:12px;margin-left:6px">('+list.length+')</span>';
    }
    sec.appendChild(h);
    if(k==='Perícia'&&orderBy==='tipo'){
      list.forEach(r=>sec.appendChild(buildPericiaBox(r)));
    }else{
      const grid=document.createElement('div');grid.className='card-list';
      list.forEach(r=>grid.appendChild(firstTipo(r)==='Perícia'?buildPericiaBox(r):buildPrazoCard(r)));
      sec.appendChild(grid);
    }
  });
  return sec;
}
function renderPassados(){return renderLista({mode:'passados'});}

function buildPrazoCard(r){
  const tipo=firstTipo(r)||'Outro';
  const cls=tipoClass(tipo);
  const data=r.fields[F.p.data];
  const du=data?daysUntil(data):null;
  const urgent=du!=null&&du>=0&&du<=3;
  const card=document.createElement('div');card.className='prazo-card '+cls;
  const proc=casoProcesso(r);
  const due=du!=null?(du<0?'há '+(-du)+'d':du===0?'hoje':'em '+du+'d'):'';
  const dueColor=du==null?'#6b7c8c':(du<0?'#a82929':du<=3?'#d64545':'#005F88');
  card.innerHTML='<div class="row-main">'+
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
        '<span class="tag t-'+cls+(urgent?' urg':'')+'">'+escHtml(tipo)+'</span>'+
        '<b style="color:#003c56;font-family:Barlow Condensed,sans-serif;font-size:16px">'+escHtml(casoNome(r))+'</b>'+
      '</div>'+
      '<div style="font-size:12px;color:#6b7c8c;margin-top:2px">'+
        (proc?escHtml(proc)+' · ':'')+
        '📅 <b style="color:'+dueColor+'">'+escHtml(fmtDate(data))+'</b>'+
        (due?' <span style="color:'+dueColor+'">('+due+')</span>':'')+
      '</div>'+
    '</div>'+
    '<div class="row-checks">'+
      chk(r,F.p.preLaudo,'Pré-Laudo')+
      chk(r,F.p.confAss,'Conf.')+
      chk(r,F.p.relato,'Relato')+
    '</div>'+
    '<div class="row-act">'+
      '<button class="btn iconbtn" title="Excluir prazo">🗑</button>'+
    '</div>';
  card.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.onchange=async()=>{
      const fid=cb.dataset.fid,recId=cb.dataset.rec,val=cb.checked;
      try{await patchRecord(TBL.prazos,recId,{[fid]:val});r.fields[fid]=val;toast('Salvo','ok');}
      catch(e){cb.checked=!val;toast('Erro: '+e.message,'err');}
    };
  });
  card.querySelector('.iconbtn').onclick=()=>confirmDelete(r);
  return card;
}
function chk(r,fid,label){
  const on=!!r.fields[fid];
  return '<label><input type="checkbox" data-rec="'+r.id+'" data-fid="'+fid+'"'+(on?' checked':'')+'> '+label+'</label>';
}
async function confirmDelete(r){
  if(!confirm('Excluir este prazo?\n\n'+casoNome(r)+'\n'+(firstTipo(r)||'')+' — '+fmtDate(r.fields[F.p.data])+'\n\nEsta ação não pode ser desfeita.'))return;
  try{
    await deleteRecord(TBL.prazos,r.id);
    DATA.prazos=DATA.prazos.filter(x=>x.id!==r.id);
    if(DATA.prazosPassados)DATA.prazosPassados=DATA.prazosPassados.filter(x=>x.id!==r.id);
    toast('Prazo excluído','ok');
    render();
  }catch(e){toast('Erro ao excluir: '+e.message,'err');}
}

// ----- CALENDÁRIO -----
function renderCalendario(){
  const sec=document.createElement('div');sec.className='section';
  const y=CAL_DATE.getFullYear(),m=CAL_DATE.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const start=new Date(first);start.setDate(1-first.getDay());
  const byDay={};
  DATA.prazos.forEach(r=>{const d=r.fields[F.p.data];if(d)(byDay[dayKey(d)]=byDay[dayKey(d)]||[]).push(r);});
  const head=document.createElement('div');head.className='cal-head';
  const ttl=CAL_DATE.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  head.innerHTML='<div class="nav"><button class="btn sm gray" id="prevM">‹</button>'+
    '<button class="btn sm gray" id="todayM">Hoje</button>'+
    '<button class="btn sm gray" id="nextM">›</button></div>'+
    '<div class="ttl">'+ttl+'</div><div></div>';
  sec.appendChild(head);
  head.querySelector('#prevM').onclick=()=>{CAL_DATE=new Date(y,m-1,1);render();};
  head.querySelector('#nextM').onclick=()=>{CAL_DATE=new Date(y,m+1,1);render();};
  head.querySelector('#todayM').onclick=()=>{CAL_DATE=new Date();render();};
  const grid=document.createElement('div');grid.className='cal';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{
    const e=document.createElement('div');e.className='dow';e.textContent=d;grid.appendChild(e);
  });
  const todayK=todayKey();
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const cell=document.createElement('div');cell.className='day'+(d.getMonth()!==m?' other':'')+(k===todayK?' today':'');
    cell.innerHTML='<div class="dn">'+d.getDate()+'</div>';
    (byDay[k]||[]).forEach(r=>{
      const tipo=firstTipo(r)||'Outro';
      const cls=tipoClass(tipo);
      const du=daysUntil(r.fields[F.p.data]);
      const urgent=du>=0&&du<=3;
      const chip=document.createElement('div');chip.className='chip '+cls+(urgent?' urg':'');
      chip.textContent=casoNome(r);
      chip.title=tipo+' — '+fmtDate(r.fields[F.p.data])+' — '+casoNome(r);
      chip.onclick=()=>openDetalheModal(r);
      cell.appendChild(chip);
    });
    grid.appendChild(cell);
  }
  sec.appendChild(grid);
  // legend
  const leg=document.createElement('div');leg.style.cssText='margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;font-size:12px';
  Object.keys(TIPO_CLASS).forEach(t=>{
    leg.innerHTML+='<span class="tag t-'+TIPO_CLASS[t]+'">'+t+'</span>';
  });
  sec.appendChild(leg);
  return sec;
}

  box.querySelector('[data-act=relatorio]').onchange=e=>save(F.p.relatorioPos,e.target.checked);
  const txt=box.querySelector('[data-act=comentario]');
  txt.onchange=()=>save(F.p.comentarioAss,txt.value);
  box.querySelector('[data-act=cobranca]').onclick=()=>openCobrancaModal(r,cobs[0]);
  box.querySelector('[data-act=remarcar]').onclick=()=>openRemarcacaoModal(r);
  box.querySelector('[data-act=del]').onclick=()=>confirmDelete(r);
  return box;
}

// Procura PIX do assistente: 1) cadastro do assistente, 2) cobranças anteriores
function lookupPixAssistente(assRec){
  if(!assRec)return'';
  const direto=assRec.fields[F.a.pix];
  if(direto)return direto;
  // Vasculha cobranças linkadas a este assistente
  const cobs=(DATA.cobs||[]).filter(c=>{
    const ls=c.fields[F.cob.assistente]||[];
    return ls.includes(assRec.id);
  });
  for(const c of cobs){
    const pix=c.fields[F.cob.pix];
    if(pix)return pix;
  }
  return'';
}

// ===== MODAL SOLICITAÇÃO DE PAGAMENTO AO ASSISTENTE (SAÍDA) =====
function openCobrancaModal(prazoRec,existingCob){
  const bg=document.createElement('div');bg.className='modal-bg';
  const m=document.createElement('div');m.className='modal';
  const link=prazoRec.fields[F.p.caso]||[];
  const casoId=link[0]||'';
  const valorAss=prazoRec.fields[F.p.valorAss]||'';
  const ass=assistFromPrazo(prazoRec);
  const assPix=lookupPixAssistente(ass);
  const isRemarc=!!prazoRec.fields[F.p.remarc];
  const hoje=new Date().toISOString().slice(0,10);
  const isEdit=!!existingCob;
  const cf=isEdit?existingCob.fields:{};
  const pago=isEdit?!!cf[F.cob.pago]:false;
  const tipopgOpts=['Assistente Técnico','Assistente Técnico (remarcação)'];
  const tipopgDefault=isRemarc?'Assistente Técnico (remarcação)':'Assistente Técnico';
  const tipopgAtual=cf[F.cob.tipopg]?(typeof cf[F.cob.tipopg]==='object'?cf[F.cob.tipopg].name:cf[F.cob.tipopg]):tipopgDefault;
  const assName=ass?(ass.fields[F.a.nome]||''):'';
  m.innerHTML='<h2>💸 '+(isEdit?'Editar Solicitação':'Solicitação de Pagamento')+'</h2>'+
    '<div style="background:#f8fbfd;border-left:4px solid #00AEEF;padding:12px 14px;border-radius:6px;margin-bottom:16px">'+
      '<div style="font-size:11px;color:#6b7c8c;text-transform:uppercase;font-weight:600">Assistente Técnico</div>'+
      '<div style="font-size:16px;color:#003c56;font-weight:700;font-family:Barlow Condensed,sans-serif">'+escHtml(assName||'(não definido)')+'</div>'+
      (ass?'<div style="font-size:11px;color:#6b7c8c;margin-top:2px">'+escHtml(ass.fields[F.a.phone]||'')+(ass.fields[F.a.email]?' · '+escHtml(ass.fields[F.a.email]):'')+'</div>':'')+
      '<div style="font-size:11px;color:#6b7c8c;margin-top:6px">Caso: <b>'+escHtml(casoNome(prazoRec))+'</b></div>'+
    '</div>'+
    '<div class="fg">'+
      '<div><label>Valor a Pagar (R$)</label><input type="number" step="0.01" id="fValor" value="'+(cf[F.cob.valorPag]||valorAss||'')+'"></div>'+
      '<div><label>Data Prevista</label><input type="date" id="fData" value="'+(cf[F.cob.dataPag]||hoje)+'"></div>'+
      '<div class="full"><label>Tipo</label><select id="fTipopg">'+
        tipopgOpts.map(t=>'<option'+(tipopgAtual===t?' selected':'')+'>'+t+'</option>').join('')+
      '</select></div>'+
      '<div class="full"><label>Chave PIX'+(assPix&&!cf[F.cob.pix]?' <span style="color:#22a06b;font-weight:600;text-transform:none">✓ preenchida automaticamente</span>':'')+'</label><input type="text" id="fPix" value="'+escHtml(cf[F.cob.pix]||assPix)+'" placeholder="CPF, telefone, email ou chave aleatória"></div>'+
      '<div class="full"><label><input type="checkbox" id="fPago"'+(pago?' checked':'')+'> Já foi pago (marque só depois de confirmar o pagamento)</label></div>'+
    '</div>'+
    '<div class="foot"><span class="msg"></span><button class="btn gray" id="cl">Cancelar</button><button class="btn green" id="sv">'+(isEdit?'Salvar':'Registrar Solicitação')+'</button></div>';
  document.getElementById('modalHost').appendChild(bg);bg.appendChild(m);
  const close=()=>bg.remove();
  m.querySelector('#cl').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};
  const msgEl=m.querySelector('.msg');
  m.querySelector('#sv').onclick=async()=>{
    const valor=parseFloat(m.querySelector('#fValor').value);
    if(isNaN(valor)||valor<=0){msgEl.textContent='Valor é obrigatório';msgEl.className='msg err';return;}
    const fields={};
    fields[F.cob.tipo]='Saída';
    fields[F.cob.categoria]='Custo Direto (Assistente)';
    fields[F.cob.tipopg]=m.querySelector('#fTipopg').value;
    fields[F.cob.valorPag]=valor;
    fields[F.cob.dataPag]=m.querySelector('#fData').value;
    const pix=m.querySelector('#fPix').value;
    if(pix)fields[F.cob.pix]=pix;
    fields[F.cob.pago]=m.querySelector('#fPago').checked;
    if(!isEdit){
      fields[F.cob.caso]=[casoId];
      fields[F.cob.prazos]=[prazoRec.id];
      if(ass)fields[F.cob.assistente]=[ass.id];
    }
    try{
      if(isEdit){
        await patchRecord(TBL.cob,existingCob.id,fields);
      }else{
        await createRecord(TBL.cob,fields);
      }
      toast('Pagamento salvo','ok');close();loadData();
    }catch(e){msgEl.textContent='Erro: '+e.message;msgEl.className='msg err';}
  };
}

// Modal Remarcação: finaliza perícia antiga e cria nova com data nova
function openRemarcacaoModal(r){
  const bg=document.createElement('div');bg.className='modal-bg';
  const m=document.createElement('div');m.className='modal';
  const link=r.fields[F.p.caso]||[];
  const casoId=link[0]||'';
  const localAtual=r.fields[F.p.local]||'';
  const cidadeAtual=r.fields[F.p.cidade]||'';
  const tipoPerAtual=r.fields[F.p.tipoPer]||'';
  m.innerHTML='<h2>↻ Remarcar Perícia</h2>'+
    '<div style="font-size:13px;color:#6b7c8c;margin-bottom:14px">Isto vai <b>finalizar</b> esta perícia (marcada como remarcada) e criar uma <b>nova</b> perícia no mesmo caso com a data nova.</div>'+
    '<div class="fg">'+
      '<div><label>Nova Data e Hora</label><input type="datetime-local" id="fData"></div>'+
      '<div><label>Tipo de Perícia</label><select id="fTipoPer"><option value="">—</option>'+TIPO_PER_OPTS.map(s=>'<option'+(tipoPerAtual===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div>'+
      '<div class="full"><label>Local</label><input type="text" id="fLocal" value="'+escHtml(localAtual)+'"></div>'+
      '<div class="full"><label>Cidade / Estado</label><input type="text" id="fCidade" value="'+escHtml(cidadeAtual)+'"></div>'+
      '<div class="full"><label>Motivo da remarcação (opcional)</label><textarea id="fObs"></textarea></div>'+
    '</div>'+
    '<div class="foot"><span class="msg"></span><button class="btn gray" id="cl">Cancelar</button><button class="btn orange" id="sv">Confirmar Remarcação</button></div>';
  document.getElementById('modalHost').appendChild(bg);bg.appendChild(m);
  const close=()=>bg.remove();
  m.querySelector('#cl').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};
  const msgEl=m.querySelector('.msg');
  m.querySelector('#sv').onclick=async()=>{
    const d=m.querySelector('#fData').value;
    if(!d){msgEl.textContent='Data é obrigatória';msgEl.className='msg err';return;}
    const tipo=m.querySelector('#fTipoPer').value;
    const local=m.querySelector('#fLocal').value;
    const cidade=m.querySelector('#fCidade').value;
    const obs=m.querySelector('#fObs').value;
    try{
      // 1) Finalizar a antiga com remarcada=true
      await patchRecord(TBL.prazos,r.id,{[F.p.remarc]:true,[F.p.finalizado]:true});
      // 2) Criar nova
      const fields={};
      fields[F.p.caso]=[casoId];
      fields[F.p.tipo]=['Perícia'];
      fields[F.p.data]=inputDatetimeToIso(d);
      if(tipo)fields[F.p.tipoPer]=tipo;
      if(local)fields[F.p.local]=local;
      if(cidade)fields[F.p.cidade]=cidade;
      if(obs)fields[F.p.obs]='Remarcação de perícia anterior. '+obs;
      else fields[F.p.obs]='Remarcação de perícia anterior.';
      await createRecord(TBL.prazos,fields);
      toast('Perícia remarcada — nova criada','ok');
      close();loadData();
    }catch(e){msgEl.textContent='Erro: '+e.message;msgEl.className='msg err';}
  };
}

    (casoProcesso(r)?'<div><b>Processo:</b> '+escHtml(casoProcesso(r))+'</div>':'')+
    (r.fields[F.p.local]?'<div><b>Local:</b> '+escHtml(r.fields[F.p.local])+'</div>':'')+
    (r.fields[F.p.cidade]?'<div><b>Cidade:</b> '+escHtml(r.fields[F.p.cidade])+'</div>':'')+

  bg.onclick=e=>{if(e.target===bg)close();};
}

// ----- MODAL NOVO PRAZO -----
document.getElementById('novoPrazoBtn').onclick=()=>openNovoPrazoModal();
function openNovoPrazoModal(prefill){
  const bg=document.createElement('div');bg.className='modal-bg';
  const m=document.createElement('div');m.className='modal';
  const tipos=Object.keys(TIPO_CLASS);
  m.innerHTML='<h2>Novo Prazo</h2><div class="fg">'+
    '<div class="full" style="position:relative">'+
      '<label>Caso</label>'+
      '<input type="text" id="fCasoInput" placeholder="Comece a digitar o nome ou processo..." autocomplete="off">'+
      '<input type="hidden" id="fCaso">'+
      '<div id="fCasoList" style="display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #cdd9e3;border-radius:6px;max-height:240px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>'+
    '</div>'+
    '<div class="full"><label>Tipo de Prazo</label><select id="fTipo">'+tipos.map(t=>'<option>'+t+'</option>').join('')+'</select></div>'+
    '<div id="periciaFields" style="display:none;width:100%">'+
      '<div class="fg">'+
        '<div><label>Data e Hora</label><input type="datetime-local" id="fData"></div>'+
        '<div><label>Tipo de Perícia</label><select id="fTipoPer"><option value="">—</option><option>Engenharia</option><option>Medicina</option></select></div>'+
        '<div class="full"><label>Assistente</label><div id="fAssSlot"></div></div>'+
        '<div class="full"><label>Local da Perícia</label><input type="text" id="fLocal"></div>'+
        '<div class="full"><label>Cidade/Estado</label><input type="text" id="fCidade"></div>'+
        '<div class="full"><label>Observação</label><textarea id="fObs"></textarea></div>'+
      '</div>'+
    '</div>'+
    '<div id="naoPericiaFields" class="full" style="display:none">'+
      '<label>Data do Prazo</label><input type="date" id="fDataSimples">'+
    '</div>'+
    '</div><div class="foot"><span class="msg"></span><button class="btn gray" id="cl">Cancelar</button><button class="btn green" id="sv">Salvar</button></div>';
  bg.appendChild(m);document.getElementById('modalHost').appendChild(bg);
  const close=()=>bg.remove();
  m.querySelector('#cl').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};

  // Autocomplete de caso
  const inp=m.querySelector('#fCasoInput');
  const hid=m.querySelector('#fCaso');
  const list=m.querySelector('#fCasoList');
  function pickCaso(c){
    hid.value=c.id;
    inp.value=(c.fields[F.c.palavra]||'(sem nome)')+(c.fields[F.c.processo]?' — '+c.fields[F.c.processo]:'');
    list.style.display='none';
  }
  function searchCasos(q){
    if(!q||q.length<2){list.style.display='none';return;}
    const ql=q.toLowerCase();
    const hits=DATA.casos.filter(c=>{
      const n=(c.fields[F.c.palavra]||'').toLowerCase();
      const p=(c.fields[F.c.processo]||'').toLowerCase();
      return n.includes(ql)||p.includes(ql);
    }).slice(0,15);
    if(!hits.length){list.innerHTML='<div style="padding:10px 12px;color:#6b7c8c;font-size:13px">Nenhum caso encontrado</div>';list.style.display='block';return;}
    list.innerHTML=hits.map(c=>'<div data-id="'+c.id+'" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #eef3f7;font-size:13px"><b>'+escHtml(c.fields[F.c.palavra]||'(sem nome)')+'</b>'+(c.fields[F.c.processo]?'<br><small style="color:#6b7c8c">'+escHtml(c.fields[F.c.processo])+'</small>':'')+'</div>').join('');
    list.style.display='block';
    list.querySelectorAll('[data-id]').forEach(el=>{
      el.onmouseenter=()=>el.style.background='#f0f7fc';
      el.onmouseleave=()=>el.style.background='';
      el.onclick=()=>{const c=DATA.casos.find(x=>x.id===el.dataset.id);if(c)pickCaso(c);};
    });
  }
  inp.oninput=()=>{hid.value='';searchCasos(inp.value);};
  inp.onfocus=()=>{if(inp.value)searchCasos(inp.value);};
  inp.onblur=()=>setTimeout(()=>list.style.display='none',180);

  // Plugar componente de assistente
  const assSlot=m.querySelector('#fAssSlot');
  const assSearch=buildAssistenteSearch({});
  assSlot.appendChild(assSearch);

  // Toggle de campos por tipo
  const tipoSel=m.querySelector('#fTipo');
  function toggleFields(){
    const isPer=tipoSel.value==='Perícia';
    m.querySelector('#periciaFields').style.display=isPer?'block':'none';
    m.querySelector('#naoPericiaFields').style.display=isPer?'none':'block';
  }
  tipoSel.onchange=toggleFields;
  toggleFields();

  if(prefill){
    const cid=prefill.casoId||prefill.casoSugerido||'';
    if(cid){const c=DATA.casos.find(x=>x.id===cid);if(c)pickCaso(c);}
    if(prefill.tipo==='laudo_publicado'||prefill.tipoSugerido==='Manifestação ao Laudo')tipoSel.value='Manifestação ao Laudo';
    else if(prefill.tipo==='pericia_designada'||prefill.tipoSugerido==='Perícia')tipoSel.value='Perícia';
    toggleFields();
    if(prefill.descricao||prefill.resumo){
      const obsEl=m.querySelector('#fObs');
      if(obsEl&&tipoSel.value==='Perícia')obsEl.value=prefill.descricao||prefill.resumo;
    }
  }
  const msg=m.querySelector('.msg');
  m.querySelector('#sv').onclick=async()=>{
    const casoId=hid.value;
    const tipo=tipoSel.value;
    if(!casoId||!tipo){msg.textContent='Caso e tipo são obrigatórios';msg.className='msg err';return;}
    const fields={};
    fields[F.p.caso]=[casoId];
    fields[F.p.tipo]=[tipo];
    if(tipo==='Perícia'){
      const data=m.querySelector('#fData').value;
      if(!data){msg.textContent='Data e hora são obrigatórios para Perícia';msg.className='msg err';return;}
      fields[F.p.data]=inputDatetimeToIso(data);
      const tipoPer=m.querySelector('#fTipoPer').value;
      const assId=assSearch.getValue();
      const local=m.querySelector('#fLocal').value;
      const cidade=m.querySelector('#fCidade').value;
      const obs=m.querySelector('#fObs').value;
      if(tipoPer)fields[F.p.tipoPer]=tipoPer;
      if(assId)fields[F.p.assistente]=[assId];
      if(local)fields[F.p.local]=local;
      if(cidade)fields[F.p.cidade]=cidade;
      if(obs)fields[F.p.obs]=obs;
    }else{
      const data=m.querySelector('#fDataSimples').value;
      if(!data){msg.textContent='Data é obrigatória';msg.className='msg err';return;}
      fields[F.p.data]=inputDateToIso(data,'12:00');
    }
    try{
      await createRecord(TBL.prazos,fields);
      toast('Prazo criado','ok');
      if(prefill&&prefill.id)ignoreAlert(prefill.id);
      close();loadData();
    }catch(e){msg.textContent='Erro: '+e.message;msg.className='msg err';}
  };
}

// ===== AUTO LOAD =====
loadData();
</script>
